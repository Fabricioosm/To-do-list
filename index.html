<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-do list </title>
</head>
<body>

    <div class="header">
       <h1 class="titulo">todo</h1>
    </div>
    <div class="container">
        <form action="">
            <div class="input-add-lista">
                <input id="item" type="text" placeholder="Adicione uma nova tarefa">

                 <button type="submit"> Criar
                    <img src="./assets/add.svg" alt="imagem de adicionar item">
                </button>
            </div>

            <div class="links">
                <a href="#Tarefas criadas">Tarefas criadas</a>
                <a href="#Concluidas">concluidas</a>
            </div>

            <div class="tasks"></div>
        </form>
    </div>
    
    
    <script src="script.js"></script>
</body>
</html>
